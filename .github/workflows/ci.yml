name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Poetry
        run: pipx install poetry

      - name: Instalar dependencias
        run: poetry install

      - name: Análisis estático de código (Black)
        run: poetry run black --check . || echo "Ignorando fallos de estilo momentáneamente"

      - name: Correr tests
        run: poetry run pytest

  build-docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t predictiva-api:${{ github.sha }} .

name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Poetry
        run: pipx install poetry

      - name: Instalar dependencias
        run: poetry install

      - name: Análisis estático de código (Black)
        run: poetry run black --check .

      - name: Correr tests
        run: poetry run pytest

  build-docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t predictiva-api:${{ github.sha }} .

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Ejecutar comandos via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: api-hidraulicos-tipazos.duckdns.org
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd Ingenieria_de_Software---Groba-Salomon-Di_Cola
            git pull origin main
            docker build -t predictiva-api .
            docker stop mi-api || true
            docker rm mi-api || true
            docker run -d --name mi-api -p 8000:8000 predictiva-api

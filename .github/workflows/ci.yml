name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Tests unitarios + Black análisis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Poetry
        run: pipx install poetry

      - name: Instalar dependencias
        run: poetry install

      - name: Análisis estático de código (Black)
        run: poetry run black --check .

      - name: Correr tests
        run: poetry run pytest --cov=api --cov-report=term-missing

  build-docker:
    name: Docker Build + escaneo Trivy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t predictiva-api:${{ github.sha }} .

      - name: Escaneo de vulnerabilidades de la imagen
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: predictiva-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

  integration-test:
    name: ITests de integración
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Levantar el stack
        run: docker compose up -d --build

      - name: Correr integration test
        run: ./scripts/integration-test.sh

      - name: Logs en caso de fallo
        if: failure()
        run: docker compose logs --no-color

      - name: Bajar el stack
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Ejecutar comandos via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: api-hidraulicos-tipazos.duckdns.org
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd Ingenieria_de_Software---Groba-Salomon-Di_Cola
            git config pull.ff only
            PREV_SHA=$(git rev-parse HEAD)
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            sleep 15
            if ! ./scripts/smoke.sh; then
              echo "Smoke test falló, rollback a $PREV_SHA"
              git reset --hard "$PREV_SHA"
              docker-compose down
              docker-compose up -d --build
              sleep 15
              ./scripts/smoke.sh || true
              exit 1
            fi
            echo "Salud post-deploy verificada"

name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Poetry
        run: pipx install poetry

      - name: Instalar dependencias
        run: poetry install

      - name: Análisis estático de código (Black)
        run: poetry run black --check .

      - name: Correr tests
        run: poetry run pytest --cov=api --cov-report=term-missing

  build-docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t predictiva-api:${{ github.sha }} .

      - name: Escaneo de vulnerabilidades de la imagen
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: predictiva-api:${{ github.sha }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Ejecutar comandos via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: api-hidraulicos-tipazos.duckdns.org
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd Ingenieria_de_Software---Groba-Salomon-Di_Cola
            git config pull.ff only
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            sleep 15
            curl -fsSL http://localhost:8000/metrics > /dev/null
            curl -fsSL -H "X-API-Key: abcdef12345" \
              "http://localhost:8000/api/v1/wells?date_query=$(date +%F)" > /dev/null
            echo "Salud post-deploy verificada"

apiVersion: 1

# Contact Points: canales donde se envían las notificaciones de alertas.
# Referencia: https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting/
#
# En desarrollo: usa webhook.site para inspeccionar payloads.
# En producción: cablea a Slack, email real, PagerDuty, etc.

contactPoints:
  - orgId: 1
    name: webhook-demo
    receivers:
      - uid: webhook-demo-receiver
        type: webhook
        settings:
          # En desarrollo: usa webhook.site para inspeccionar payloads en tiempo real
          # Pasos:
          # 1. Ir a https://webhook.site
          # 2. Copiar la URL única (ej: https://webhook.site/abc123def456...)
          # 3. Reemplazar la URL abajo
          # Para demo: comentada. Descomentar cuando tengas webhook.site
          url: http://localhost:8080
          httpMethod: POST
          title: "{{ .GroupLabels.alertname }}"
          text: "{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}"

  # Contact point para SMTP (email)
  # Requiere credenciales SMTP en el .env de la instancia (GF_SMTP_* env vars)
  - orgId: 1
    name: email-ops
    receivers:
      - uid: email-ops-receiver
        type: email
        settings:
          addresses: tipazos.predictiva@gmail.com

  # Contact point para Slack (ejercicio en clase)
  # Descomentar y reemplazar SLACK_WEBHOOK_URL cuando esté disponible.

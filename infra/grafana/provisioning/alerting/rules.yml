apiVersion: 1

# Reglas de alertas evaluadas por Grafana directamente sobre el datasource
# de Prometheus. Los labels deben matchear con notificationpolicies.yml para
# rutear al receiver correcto (severity=critical -> email-ops).

groups:
  - orgId: 1
    name: predictiva-api
    folder: Predictiva
    interval: 30s
    rules:
      - uid: servicio_caido_grafana
        title: ServicioCaido
        condition: B
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: P1B8CF91FBBEBA6A8
            model:
              expr: 'up{job="predictiva-api"}'
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    params: [0.5]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: []
                  reducer:
                    params: []
                    type: last
                  type: query
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
        noDataState: Alerting
        execErrState: Error
        for: 1m
        labels:
          severity: critical
          component: api
        annotations:
          summary: API Predictiva caída
          description: El servicio en {{ $labels.instance }} no responde durante al menos 1 minuto.

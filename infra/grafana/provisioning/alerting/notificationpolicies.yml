apiVersion: 1

# Notification Policies: reglas de ruteo que determinan A DÓNDE se envía cada alerta.
# Referencia: https://grafana.com/docs/grafana/latest/alerting/set-up/provision-alerting/
#
# Flujo:
# 1. Una alerta dispara (p.ej. "LatenciaForecastAlta" con severity=warning)
# 2. Grafana busca qué receiver manejar la alerta según los matchers
# 3. La notificación se envía al contact point correspondiente
#
# En este ejemplo:
# - critical → email (ops debe actuar rápido)
# - warning → webhook (monitoreo manual)
# - info → descartada (ruido)

notificationPolicies:
  - orgId: 1
    # Receiver por defecto (fallback si no coincide ningún matcher)
    receiver: webhook-demo

    # Agrupar alertas con el mismo alertname y componente durante 5 minutos
    # antes de enviar notificaciones. Evita spam.
    groupBy:
      - alertname
      - component
    groupWait: 10s
    groupInterval: 5m
    repeatInterval: 4h

    # Rutas: casos especiales que sobrescriben el receiver por defecto
    routes:
      # Ruta 1: Alertas críticas → email (acción inmediata)
      - receiver: email-ops
        matchers:
          - label: severity
            value: critical
            matchType: "="
        groupWait: 0s      # Enviar inmediatamente, sin esperar
        repeatInterval: 1h # Recordar cada hora si sigue activa

      # Ruta 2: Alertas de host → webhook demo (pueden monitorear desde UI)
      - receiver: webhook-demo
        matchers:
          - label: component
            value: host
            matchType: "="
        groupWait: 30s
        repeatInterval: 2h

      # Ruta 3: Alertas de Prometheus → webhook
      #  (problemas del stack de observabilidad)
      - receiver: webhook-demo
        matchers:
          - label: component
            value: prometheus
            matchType: "="
        groupWait: 1m
        repeatInterval: 2h

      # Ruta 4 (descomentar si Slack está disponible):
      # Alertas de API en desarrollo → Slack
